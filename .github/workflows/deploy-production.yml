name: Deploy → Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to oguncongress.gratus.com.ng
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            PHP="/opt/alt/php84/usr/bin/php -d memory_limit=512M -d extension=phar.so -d extension=mbstring.so -d extension=dom.so -d extension=intl.so -d extension=posix.so -d extension=fileinfo.so -d extension=gd.so -d extension=xmlreader.so -d extension=xmlwriter.so -d extension=zip.so -d extension=pdo.so -d extension=pdo_mysql.so"

            cd ~/public_html/oguncongress.gratus.com.ng

            echo "→ Pulling latest main branch..."
            git fetch origin main
            git reset --hard origin/main

            echo "→ Restoring .user.ini..."
            echo '; cPanel-generated php ini directives, do not edit' > public/.user.ini

            echo "→ Installing dependencies..."
            $PHP /usr/local/bin/composer install --no-scripts

            echo "→ Running post-install scripts..."
            $PHP artisan package:discover --ansi

            echo "→ Running migrations..."
            $PHP artisan migrate --force

            echo "→ Rebuilding caches..."
            $PHP artisan config:cache
            $PHP artisan route:cache
            $PHP artisan view:cache

            echo "→ Restarting queue workers..."
            $PHP artisan queue:restart

            echo "✓ Production deploy complete"

name: Deploy → Dev

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    name: Deploy to congress-dev.gratus.com.ng
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ~/public_html/congress-dev.gratus.com.ng

            echo "→ Pulling latest dev branch..."
            git fetch origin dev
            git reset --hard origin/dev

            echo "→ Installing dependencies..."
            /opt/alt/php84/usr/bin/php \
              -d extension=phar.so \
              -d extension=mbstring.so \
              -d extension=dom.so \
              -d extension=intl.so \
              -d extension=posix.so \
              -d extension=fileinfo.so \
              -d extension=gd.so \
              -d extension=xmlreader.so \
              -d extension=xmlwriter.so \
              -d extension=zip.so \
              -d extension=pdo.so \
              -d extension=pdo_mysql.so \
              /usr/local/bin/composer install --no-scripts

            echo "→ Running post-install scripts..."
            /opt/alt/php84/usr/bin/php artisan package:discover --ansi

            echo "→ Running migrations..."
            /opt/alt/php84/usr/bin/php artisan migrate --force

            echo "→ Clearing caches..."
            /opt/alt/php84/usr/bin/php artisan config:clear
            /opt/alt/php84/usr/bin/php artisan route:clear
            /opt/alt/php84/usr/bin/php artisan view:clear

            echo "→ Restarting queue workers..."
            /opt/alt/php84/usr/bin/php artisan queue:restart

            echo "✓ Dev deploy complete"

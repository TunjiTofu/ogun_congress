name: Deploy → Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to oguncongress.gratus.com.ng
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ~/public_html/oguncongress.gratus.com.ng

            echo "→ Pulling latest main branch..."
            git fetch origin main
            git reset --hard origin/main

            echo "→ Installing dependencies..."
            /opt/alt/php84/usr/bin/php \
              -d extension=phar.so \
              -d extension=mbstring.so \
              -d extension=dom.so \
              -d extension=intl.so \
              -d extension=posix.so \
              -d extension=fileinfo.so \
              -d extension=gd.so \
              -d extension=xmlreader.so \
              -d extension=xmlwriter.so \
              -d extension=zip.so \
              -d extension=pdo.so \
              -d extension=pdo_mysql.so \
              /usr/local/bin/composer install --no-scripts

            echo "→ Running post-install scripts..."
            /opt/alt/php84/usr/bin/php artisan package:discover --ansi

            echo "→ Running migrations..."
            /opt/alt/php84/usr/bin/php artisan migrate --force

            echo "→ Rebuilding caches..."
            /opt/alt/php84/usr/bin/php artisan config:cache
            /opt/alt/php84/usr/bin/php artisan route:cache
            /opt/alt/php84/usr/bin/php artisan view:cache

            echo "→ Restarting queue workers..."
            /opt/alt/php84/usr/bin/php artisan queue:restart

            echo "✓ Production deploy complete"

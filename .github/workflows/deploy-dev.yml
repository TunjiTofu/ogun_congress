name: Deploy → Dev

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    name: Deploy to congress-dev.gratus.com.ng
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            PHP="/opt/alt/php84/usr/bin/php -d memory_limit=512M -d extension=phar.so -d extension=mbstring.so -d extension=dom.so -d extension=intl.so -d extension=posix.so -d extension=fileinfo.so -d extension=gd.so -d extension=xmlreader.so -d extension=xmlwriter.so -d extension=zip.so -d extension=pdo.so -d extension=pdo_mysql.so"

            cd ~/public_html/congress-dev.gratus.com.ng

            echo "→ Pulling latest dev branch..."
            git fetch origin dev
            git reset --hard origin/dev

            echo "→ Restoring PHP handler and user.ini..."
            grep -q 'alt-php84' public/.htaccess || printf '\n<IfModule mime_module>\n    AddHandler application/x-httpd-alt-php84 .php\n</IfModule>\n' >> public/.htaccess
            printf '; cPanel-generated php ini directives, do not edit\nupload_tmp_dir=/home2/gratusco/tmp\nsys_temp_dir=/home2/gratusco/tmp\n' > public/.user.ini

            echo "→ Installing dependencies..."
            $PHP /usr/local/bin/composer install --no-scripts

            echo "→ Running post-install scripts..."
            $PHP artisan package:discover --ansi

            echo "→ Running migrations..."
            $PHP artisan migrate --force

            echo "→ Clearing caches..."
            $PHP artisan config:clear
            $PHP artisan route:clear
            $PHP artisan view:clear

            echo "→ Restarting queue workers..."
            $PHP artisan queue:restart

            echo "✓ Dev deploy complete"
